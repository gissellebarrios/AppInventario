<h2>Registro de Medicamentos</h2>
<form (submit)="onSubmit()">
  <label for="codigo">Código:</label>
  <input type="text" id="codigo" ([ngModel])="medicamento.codigo" name="codigo" required>
  
  <label for="nombre">Nombre:</label>
  <input type="text" id="nombre" ([ngModel])="medicamento.nombre" name="nombre" required>
  
  <label for="descripcion">Descripción:</label>
  <textarea id="descripcion" (ngModel)="medicamento.descripcion" name="descripcion" required></textarea>
  
  <label for="cantidad">Cantidad:</label>
  <input type="number" id="cantidad" ([ngModel)]="medicamento.cantidad" name="cantidad" required>
  
  <label for="precio">Precio por Unidad:</label>
  <input type="number" id="precio" ([ngModel)]="medicamento.precio" name="precio" required step="0.01">
  
  <label for="lote">Lote:</label>
  <input type="text" id="lote" ([ngModel)]="medicamento.lote" name="lote" required>

  <label for="fechaCaducidad">Fecha de Caducidad:</label>
  <input type="date" id="fechaCaducidad" ([ngModel)]="medicamento.fechaCaducidad" name="fechaCaducidad" required>
  
  <button type="submit">Registrar</button>
</form>
